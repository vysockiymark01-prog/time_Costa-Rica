<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8faff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --info-bg: rgba(59, 130, 246, 0.08);
            --info-border: rgba(59, 130, 246, 0.2);
            --info-text: #1e293b;
        }
        .dark-mode {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --info-bg: rgba(59, 130, 246, 0.15);
            --info-border: rgba(59, 130, 246, 0.3);
            --info-text: #f1f5f9;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .time-box {
            padding: 1.25rem;
            border-radius: 0.75rem;
            flex: 1;
        }
        .blue-box { background-color: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59, 130, 246, 0.2); }
        .purple-box { background-color: rgba(168, 85, 247, 0.08); border: 1px solid rgba(168, 85, 247, 0.2); }
        .info-panel {
            background-color: var(--info-bg);
            border: 1px solid var(--info-border);
            color: var(--info-text);
            padding: 1.25rem;
            border-radius: 0.75rem;
        }
        .btn-theme {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            color: #fbbf24;
            cursor: pointer;
        }
        .time-display {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <i class="far fa-clock text-blue-500 text-3xl"></i>
                <h1 id="ui-title" class="text-2xl font-bold"></h1>
            </div>
            <button onclick="toggleTheme()" class="btn-theme" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="card">
            <h2 class="flex items-center gap-2 mb-4 font-semibold opacity-80">
                <i class="far fa-clock text-green-500"></i> <span id="ui-current-time-title"></span>
            </h2>
            <div class="flex flex-col md:flex-row gap-4">
                <div class="time-box blue-box">
                    <p class="text-sm text-blue-600 font-medium mb-1"><i class="fas fa-location-dot"></i> <span id="my-city-label"></span></p>
                    <div id="now-my-city" class="text-3xl font-bold text-blue-600 time-display">00:00:00</div>
                    <p id="now-my-date" class="text-xs opacity-60 mt-1">...</p>
                </div>
                <div class="time-box purple-box">
                    <p class="text-sm text-purple-600 font-medium mb-1"><i class="fas fa-location-dot"></i> <span id="ui-cr-label"></span></p>
                    <div id="now-other-city" class="text-3xl font-bold text-purple-600 time-display">00:00:00</div>
                    <p id="now-other-date" class="text-xs opacity-60 mt-1">...</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="flex items-center gap-2 mb-4 font-semibold opacity-80">
                <i class="far fa-calendar text-orange-500"></i> <span id="ui-calc-title"></span>
            </h2>
            <div class="flex flex-wrap gap-6 mb-6">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="calc-mode" value="my" class="w-4 h-4" onchange="updateUIStrings()">
                    <span id="ui-opt-my"></span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="calc-mode" value="other" checked class="w-4 h-4" onchange="updateUIStrings()">
                    <span id="ui-opt-other"></span>
                </label>
            </div>
            <div class="space-y-2">
                <label id="input-label" class="block text-sm font-medium opacity-70"></label>
                <input type="datetime-local" id="calc-input" oninput="updateCalculation()"
                    class="w-full p-3 border rounded-lg bg-transparent focus:ring-2 focus:ring-blue-500 outline-none border-gray-300">
            </div>
        </div>

        <div class="card">
            <h2 id="ui-res-title" class="text-lg font-bold mb-4"></h2>
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <div class="time-box blue-box">
                    <p id="ui-res-my-label" class="text-sm text-blue-600 font-medium mb-1"></p>
                    <div id="res-my-time" class="text-3xl font-bold text-blue-600 time-display">--:--:--</div>
                    <p id="res-my-date" class="text-xs opacity-60 mt-1">-- --- ----</p>
                </div>
                <div class="time-box purple-box">
                    <p id="ui-res-cr-label" class="text-sm text-purple-600 font-medium mb-1"></p>
                    <div id="res-other-time" class="text-3xl font-bold text-purple-700 time-display">--:--:--</div>
                    <p id="res-other-date" class="text-xs opacity-60 mt-1">-- --- ----</p>
                </div>
            </div>
            <div class="info-panel">
                <h3 id="ui-info-head" class="font-bold mb-2"></h3>
                <ul class="text-sm space-y-1 opacity-90">
                    <li id="info-diff"></li>
                    <li id="info-mode"></li>
                    <li id="info-tz"></li>
                    <li class="text-green-600 dark:text-green-400 font-medium"><i class="fas fa-check"></i> <span id="ui-save-info"></span></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Unicode dictionary to prevent encoding issues
        const T = {
            title: "\u0420\u0430\u0441\u0447\u0451\u0442 \u0432\u0440\u0435\u043c\u0435\u043d\u0438",
            curTime: "\u0422\u0435\u043a\u0443\u0449\u0435\u0435 \u0432\u0440\u0435\u043c\u044f",
            myCity: "\u041c\u043e\u0439 \u0433\u043e\u0440\u043e\u0434",
            costaRica: "\u041a\u043e\u0441\u0442\u0430-\u0420\u0438\u043a\u0430",
            calc: "\u041a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440 \u0432\u0440\u0435\u043c\u0435\u043d\u0438",
            optMy: "\u0412\u0432\u0435\u0441\u0442\u0438 \u0432\u0440\u0435\u043c\u044f \u043c\u043e\u0435\u0433\u043e \u0433\u043e\u0440\u043e\u0434\u0430",
            optOther: "\u0412\u0432\u0435\u0441\u0442\u0438 \u0432\u0440\u0435\u043c\u044f \u0434\u0440\u0443\u0433\u043e\u0433\u043e \u0433\u043e\u0440\u043e\u0434\u0430",
            res: "\u0420\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442 \u0440\u0430\u0441\u0447\u0451\u0442\u0430",
            info: "\u0418\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u044f:",
            diff: "\u0420\u0430\u0437\u043d\u0438\u0446\u0430 \u0432\u043e \u0432\u0440\u0435\u043c\u0435\u043d\u0438:",
            mode: "\u0420\u0435\u0436\u0438\u043c \u0440\u0430\u0441\u0447\u0451\u0442\u0430:",
            save: "\u0421\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u043f\u0440\u0438\u043b\u043e\u0436\u0435\u043d\u0438\u044f \u0441\u043e\u0445\u0440\u0430\u043d\u044f\u0435\u0442\u0441\u044f",
            hours: "\u0447\u0430\u0441\u043e\u0432",
            vCr: "\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u0434\u0430\u0442\u0443 \u0438 \u0432\u0440\u0435\u043c\u044f \u0432 \u041a\u043e\u0441\u0442\u0430-\u0420\u0438\u043a\u0435:",
            vMy: "\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u0434\u0430\u0442\u0443 \u0438 \u0432\u0440\u0435\u043c\u044f \u0432 \u0432\u0430\u0448\u0435\u043c \u0433\u043e\u0440\u043e\u0434\u0435:",
            fromCr: "\u041e\u0442 \u041a\u043e\u0441\u0442\u0430-\u0420\u0438\u043a\u0438",
            fromMy: "\u041e\u0442 \u043c\u043e\u0435\u0433\u043e \u0433\u043e\u0440\u043e\u0434\u0430"
        };

        const COSTA_RICA_TZ = "America/Costa_Rica";

        function initUI() {
            document.getElementById('ui-title').innerText = T.title;
            document.getElementById('ui-current-time-title').innerText = T.curTime;
            document.getElementById('my-city-label').innerText = T.myCity;
            document.getElementById('ui-cr-label').innerText = T.costaRica;
            document.getElementById('ui-calc-title').innerText = T.calc;
            document.getElementById('ui-opt-my').innerText = T.optMy;
            document.getElementById('ui-opt-other').innerText = T.optOther;
            document.getElementById('ui-res-title').innerText = T.res;
            document.getElementById('ui-res-my-label').innerText = T.myCity;
            document.getElementById('ui-res-cr-label').innerText = T.costaRica;
            document.getElementById('ui-info-head').innerText = T.info;
            document.getElementById('ui-save-info').innerText = T.save;
            updateUIStrings();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#themeToggle i');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        async function detectCity() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if (data.city) {
                    document.getElementById('my-city-label').innerText = T.myCity + " (" + data.city + ")";
                }
            } catch (e) {}
        }

        function formatFullDate(date, timeZone) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            if (timeZone) options.timeZone = timeZone;
            try {
                return date.toLocaleDateString('ru-RU', options);
            } catch (e) {
                return date.toDateString();
            }
        }

        function updateRealTime() {
            const now = new Date();
            const crTimeStr = now.toLocaleTimeString('ru-RU', { timeZone: COSTA_RICA_TZ, hour12: false });
            
            document.getElementById('now-my-city').innerText = now.toLocaleTimeString('ru-RU');
            document.getElementById('now-my-date').innerText = formatFullDate(now);
            document.getElementById('now-other-city').innerText = crTimeStr;
            document.getElementById('now-other-date').innerText = formatFullDate(now, COSTA_RICA_TZ);

            const myOffset = -now.getTimezoneOffset() / 60;
            const diff = myOffset - (-6);
            
            document.getElementById('info-diff').innerText = T.diff + " " + Math.abs(diff) + " " + T.hours;
            document.getElementById('info-tz').innerText = "Zones: UTC" + (myOffset >= 0 ? '+' : '') + myOffset + " vs UTC-6";
        }

        function updateUIStrings() {
            const mode = document.querySelector('input[name="calc-mode"]:checked').value;
            const label = document.getElementById('input-label');
            const info = document.getElementById('info-mode');
            
            if (mode === 'my') {
                label.innerText = T.vMy;
                info.innerText = T.mode + " " + T.fromMy;
            } else {
                label.innerText = T.vCr;
                info.innerText = T.mode + " " + T.fromCr;
            }
            updateCalculation();
        }

        function updateCalculation() {
            const inputVal = document.getElementById('calc-input').value;
            const mode = document.querySelector('input[name="calc-mode"]:checked').value;
            if (!inputVal) return;

            const inputDate = new Date(inputVal);
            const userOffsetMin = inputDate.getTimezoneOffset(); 
            const crOffsetMin = 360; 

            let myDate, otherDate;
            if (mode === 'my') {
                myDate = inputDate;
                const diffMs = (userOffsetMin - crOffsetMin) * 60 * 1000;
                otherDate = new Date(inputDate.getTime() + diffMs);
            } else {
                otherDate = inputDate;
                const utc = inputDate.getTime() + (crOffsetMin * 60 * 1000);
                myDate = new Date(utc - (userOffsetMin * 60 * 1000));
            }

            document.getElementById('res-my-time').innerText = myDate.toLocaleTimeString('ru-RU');
            document.getElementById('res-my-date').innerText = formatFullDate(myDate);
            document.getElementById('res-other-time').innerText = otherDate.toLocaleTimeString('ru-RU');
            document.getElementById('res-other-date').innerText = formatFullDate(otherDate);
        }

        function setCurrentDateTime() {
            const now = new Date();
            const tzOffset = now.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(now - tzOffset)).toISOString().slice(0, 16);
            document.getElementById('calc-input').value = localISOTime;
        }

        initUI();
        detectCity();
        setInterval(updateRealTime, 1000);
        updateRealTime();
        setCurrentDateTime();
    </script>
</body>
</html>
